version: '3.8'

services:
  orchestrator:
    build: .
    restart: always
    environment:
      - FORGEJO_URL=https://forgejo.kluth.cloud
      - FORGEJO_TOKEN=${FORGEJO_TOKEN}
      - FORGEJO_ORG=ai-company
      - NEEDLE_CHECKPOINT_PATH=/app/data/needle.pkl
      - PORT=5000
    volumes:
      - ./data/orchestrator:/app/data
      - ./config:/app/config
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ai-company.rule=Host(`ai-company.kluth.cloud`)"
      - "traefik.http.routers.ai-company.entrypoints=websecure"
      - "traefik.http.routers.ai-company.tls.certresolver=letsencrypt"
      - "traefik.http.services.ai-company.loadbalancer.server.port=5000"

networks:
  default:
    name: traefik-network
    external: true
